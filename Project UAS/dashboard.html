<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Produk | Purri Donat</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background: #fff8f3;
            font-family: Arial, sans-serif;
        }
        .navbar {
            background: #8b4513;
        }
        .card-produk {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        .card-produk:hover {
            transform: translateY(-5px);
        }
        .card-produk img {
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
            height: 200px;
            object-fit: cover;
        }
        .btn-logout {
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold" href="#">🍩 Purri Admin Panel</a>
                <div class="ms-auto">
                    <a href="index.html" class="btn btn-danger btn-sm btn-logout px-3">Keluar</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="container py-5">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold text-secondary">Daftar Produk Toko</h3>
            <span class="text-muted">Total: 4 Varian</span>
        </div>

        <section class="row g-4">
            
            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card card-produk bg-white h-100">
                    <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b?w=500" alt="Donat Coklat">
                    <div class="card-body d-flex flex-column justify-content-between">
                        <div>
                            <h5 class="fw-bold mb-1">Donat Coklat</h5>
                            <p class="text-success fw-bold mb-2">Rp10.000</p>
                        </div>
                        <span class="badge bg-success-subtle text-success w-100 py-2">Stok: 45 Pcs</span>
                    </div>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card card-produk bg-white h-100">
                    <img src="https://images.unsplash.com/photo-1521302200778-33500795e128?w=500" alt="Donat Strawberry">
                    <div class="card-body d-flex flex-column justify-content-between">
                        <div>
                            <h5 class="fw-bold mb-1">Donat Strawberry</h5>
                            <p class="text-success fw-bold mb-2">Rp12.000</p>
                        </div>
                        <span class="badge bg-success-subtle text-success w-100 py-2">Stok: 30 Pcs</span>
                    </div>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card card-produk bg-white h-100">
                    <img src="https://images.unsplash.com/photo-1603532648955-039310d9ed75?w=500" alt="Donat Matcha">
                    <div class="card-body d-flex flex-column justify-content-between">
                        <div>
                            <h5 class="fw-bold mb-1">Donat Matcha</h5>
                            <p class="text-success fw-bold mb-2">Rp13.000</p>
                        </div>
                        <span class="badge bg-danger-subtle text-danger w-100 py-2">Stok: Habis</span>
                    </div>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card card-produk bg-white h-100">
                    <img src="https://images.unsplash.com/photo-1519864600265-abb23847ef2c?w=500" alt="Donat Keju">
                    <div class="card-body d-flex flex-column justify-content-between">
                        <div>
                            <h5 class="fw-bold mb-1">Donat Keju</h5>
                            <p class="text-success fw-bold mb-2">Rp11.000</p>
                        </div>
                        <span class="badge bg-success-subtle text-success w-100 py-2">Stok: 15 Pcs</span>
                    </div>
                </div>
            </div>

        </section>
        
    </main>

</body>
</html>
