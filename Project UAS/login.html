<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Purri Donat</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background: #fff8f3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }
        .login-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
        }
        .btn-login {
            background: #8b4513;
            color: white;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-login:hover {
            background: #6d3207;
            color: white;
        }
    </style>
</head>
<body>

<div class="login-card mx-3">
    
    <!-- Judul Sederhana -->
    <h3 class="text-center mb-4" style="color: #8b4513; font-weight: bold;">🍩 Purri Donat</h3>
    
    <!-- Form Login langsung diarahkan ke dashboard.html -->
    <form action="dashboard.html" method="GET">
        
        <!-- Input Email -->
        <div class="mb-3">
            <label for="email" class="form-label text-muted small">Email</label>
            <input type="email" class="form-control" id="email" placeholder="Masukkan email" required>
        </div>
        
        <!-- Input Password -->
        <div class="mb-4">
            <label for="password" class="form-label text-muted small">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Masukkan password" required>
        </div>
        
        <!-- Tombol Masuk -->
        <button type="submit" class="btn btn-login mb-3">Masuk</button>
        
    </form>
    
    <!-- Tombol Kembali ke index.html -->
    <div class="text-center">
        <a href="index.html" class="text-decoration-none small" style="color: #ff8c42;">← Kembali ke Beranda</a>
    </div>

</div>

</body>
</html>
